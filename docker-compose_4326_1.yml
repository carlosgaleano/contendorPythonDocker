services:
  api:
    build: .
    container_name: fastapi
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      POSTGRES_HOST: db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
      POSTGRES_PORT: "5432"
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["uvicorn", "paquete.main:app", "--host", "0.0.0.0", "--port", "8000"]

  api-dev:
    extends: api
    profiles: ["dev"]
    volumes:
      - ./:/app
    command: ["uvicorn", "paquete.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app"]