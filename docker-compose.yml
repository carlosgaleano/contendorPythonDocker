services:
  api:
    build: .
    image: fastapi-postgres:latest
    container_name: fastapi
    working_dir: /app
    volumes:
      - ./:/app
      - ./.env:/app/.env          # para que db.py pueda leer el .env si usas load_dotenv
    env_file:
      - .env                      # exporta las variables al entorno del contenedor
    networks:
      - laravel                   # <-- la MISMA red donde está tu Postgres
    ports:
      - "8000:8000"
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app

# Declara la red como EXTERNA porque ya existe (creada por el otro stack)
networks:
  laravel:
    external: true



